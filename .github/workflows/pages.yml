# GitHub Pages product deploy requires a plan that supports Pages for this repo
# (private repos often need GitHub Pro, or use a public repo for free Pages).
# This job still builds the site, verifies a 200 response, and uploads _site/ as an artifact.

name: Site build and verify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install and test
        run: |
          npm ci
          npm test
      - name: Assemble static site
        run: npm run site:build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
      - name: Local HTTP 200 (smoke)
        run: |
          python3 -m http.server 9999 --directory _site > /dev/null 2>&1 &
          for i in $(seq 1 30); do
            if curl -sfS -o /dev/null "http://127.0.0.1:9999/"; then
              break
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then echo "server did not start"; exit 1; fi
          done
          code=$(curl -sS -o /dev/null -w "%{http_code}" "http://127.0.0.1:9999/")
          if [ "$code" != "200" ]; then echo "expected 200, got $code"; exit 1; fi
          echo "OK: root returns HTTP $code"
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: _site
          if-no-files-found: error
