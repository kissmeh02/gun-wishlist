<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gun Collection Tracker</title>
    <meta
      name="description"
      content="Texas build wishlist: track a firearms collection with categories, NFA flags, and local progress."
    />
    <meta name="theme-color" content="#0f0f0f" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles/main.css" />
    <meta property="og:title" content="Gun Collection Tracker" />
    <meta
      property="og:description"
      content="Track your Texas build collection: handguns, rifles, shotguns, NFA items, and acquisition progress."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://kissmeh02.github.io/gun-wishlist/"
    />
  </head>
  <body>
    <h1>Gun Collection — Texas Build</h1>
    <p class="subhead" id="catalog-dates"></p>

    <section class="add-gun" aria-label="Add wishlist item">
      <h2 class="h2-sec">Add a wishlist item</h2>
      <form id="add-gun-form" class="add-gun-form">
        <div class="add-gun-row">
          <label class="add-label"
            >Name <input name="n" type="text" required maxlength="200" />
          </label>
        </div>
        <div class="add-gun-row add-gun-grid">
          <label class="add-label"
            >Caliber
            <input name="cal" type="text" maxlength="80" placeholder="9mm" />
          </label>
          <label class="add-label"
            >Category
            <input
              name="cat"
              type="text"
              list="add-cat-dl"
              maxlength="100"
              placeholder="e.g. Handguns"
            />
          </label>
        </div>
        <datalist id="add-cat-dl"></datalist>
        <div class="add-gun-row add-checks">
          <label
            ><input name="nfa" type="checkbox" /> <span>NFA (suppressor, SBR, etc.)</span></label
          >
          <label
            ><input name="mil" type="checkbox" />
            <span>Military / duty style</span></label
          >
        </div>
        <div class="add-gun-row">
          <label class="add-label"
            >Notes
            <textarea
              name="note"
              rows="2"
              maxlength="2000"
              placeholder="Optic, SBR, import notes, etc."
            ></textarea>
          </label>
        </div>
        <div class="add-gun-row">
          <button type="submit" class="btn-add">Add to list</button>
        </div>
      </form>
    </section>

    <div class="controls">
      <select id="catFilter" aria-label="Filter by category">
        <option value="">All categories</option>
      </select>
      <select id="nfaFilter" aria-label="NFA filter">
        <option value="">All items</option>
        <option value="nfa">NFA items only</option>
        <option value="standard">Standard (no NFA)</option>
      </select>
      <input
        id="search"
        type="search"
        placeholder="Search name or caliber..."
        autocomplete="off"
        aria-label="Search"
      />
    </div>
    <p class="tools" role="group" aria-label="Backup and link tools">
      <button type="button" id="copy-view-link" class="btn-tool">
        Copy view link
      </button>
      <span class="copy-feedback" id="copy-feedback" role="status" aria-live="polite"></span>
      <button type="button" id="export-backup" class="btn-tool">Download backup (JSON)</button>
      <button type="button" id="import-backup" class="btn-tool">Import backup</button>
      <input
        id="import-backup-file"
        type="file"
        accept="application/json,.json"
        hidden
        title="Select backup JSON"
      />
      <span class="tools-hint"
        >Share links keep category, NFA filter, and search. Backup saves custom items and checkmarks.</span
      >
    </p>
    <div class="stats" id="stats"></div>
    <div style="overflow-x: auto">
      <table>
        <thead>
          <tr>
            <th style="width: 28px"></th>
            <th>Name</th>
            <th>Caliber</th>
            <th>Tags</th>
            <th>Notes</th>
            <th class="th-action"> </th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <p class="page-footer">
      <a id="notion-link" href="#" rel="noopener noreferrer"
        >Notion (set URL in src/config.js)</a
      >
    </p>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
